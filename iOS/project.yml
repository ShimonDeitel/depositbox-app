name: Depositbox
options:
  bundleIdPrefix: com.shimondeitel.depositbox
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Depositbox:
    type: application
    platform: iOS
    sources:
      - path: Depositbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.depositbox
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Depositbox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DepositboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DepositboxTests
      - path: Depositbox.storekit
    dependencies:
      - target: Depositbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.depositbox.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DepositboxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DepositboxUITests
    dependencies:
      - target: Depositbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.depositbox.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Depositbox:
    build:
      targets:
        Depositbox: all
        DepositboxTests: [test]
        DepositboxUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Depositbox.storekit
    test:
      config: Debug
      storeKitConfiguration: Depositbox.storekit
      targets:
        - DepositboxTests
        - DepositboxUITests
    archive:
      config: Release
